            if (currentLang === 'zh') {
                if (!darkSky) return '太陽尚未低到天文夜，今晚這個時段不適合看銀河。';
                if (weatherPending) return `所選日期不在可用天氣預報範圍，先以天文條件估算；月面照明約 ${Math.round(moonIllumination * 100)}%。`;
                if (level === 'excellent') return '天夠黑、月光干擾低，今晚很適合觀賞銀河帶。';
                if (level === 'high') return `雲量約 ${cloudCover}% 且月光干擾低，今晚有不錯的銀河機會。`;
                if (level === 'moderate') return `月光或雲量有些干擾，建議挑更晚、更暗的時段再觀察。`;
                return `月光約 ${Math.round(moonIllumination * 100)}% 或雲量偏高，今晚觀銀河條件不佳。`;
            }

            if (!darkSky) return 'The sun has not dropped deep enough below the horizon for a proper Milky Way window.';
            if (weatherPending) return `This date is outside the weather forecast window, so this score uses astronomy-only inputs with moon illumination near ${Math.round(moonIllumination * 100)}%.`;
            if (level === 'excellent') return 'Dark skies, low moonlight, and low cloud cover make tonight ideal for Milky Way viewing.';
            if (level === 'high') return `Cloud cover near ${cloudCover}% and light moon interference keep tonight promising for Milky Way viewing.`;
            if (level === 'moderate') return 'Moonlight or cloud cover adds some interference. A later and darker slot may work better.';
            return 'Moonlight or heavier cloud cover makes Milky Way viewing difficult tonight.';
        }

        function getMilkyWayTargetDate() {
            if (activeDayIndex >= 0 && itinerary[activeDayIndex]?.actualDate) {
                return itinerary[activeDayIndex].actualDate;
            }
            const selectedStop = getSelectedSkyConditionsStop();
            return selectedStop?.actualDate
                || itinerary[0]?.actualDate
                || formatLocalDateKey(new Date());
        }

        function getDaysFromToday(targetDateString) {
            return compareDateKeys(targetDateString, getCurrentNzDateKey());
        }

        function isMilkyWayWeatherPending(daysFromToday) {
            if (!Number.isFinite(daysFromToday)) return true;
            return daysFromToday < 0 || daysFromToday >= MILKY_WAY_WEATHER_FORECAST_DAYS;
        }

        function ceilDateToHalfHour(date) {
            const next = new Date(date);
            next.setSeconds(0, 0);
            const minutes = next.getMinutes();
            if (minutes === 0 || minutes === 30) return next;
            if (minutes < 30) {
                next.setMinutes(30, 0, 0);
            } else {
                next.setHours(next.getHours() + 1, 0, 0, 0);
            }
            return next;
        }

        function getMilkyWaySlotRange(targetDateString, coord) {
            const targetDate = makeTimeZoneDate(targetDateString, 12, 0);
            const nextDateString = addDaysToDateKey(targetDateString, 1);
            const nextDate = makeTimeZoneDate(nextDateString, 12, 0);
            const todayTimes = SunCalc.getTimes(targetDate, coord.lat, coord.lon);
            const nextDayTimes = SunCalc.getTimes(nextDate, coord.lat, coord.lon);
            const start = new Date((todayTimes.sunset || makeTimeZoneDate(targetDateString, 18, 0)).getTime() + (30 * 60000));
            const latestEnd = makeTimeZoneDate(nextDateString, 4, 0);
            const astronomicalEnd = nextDayTimes.nightEnd || nextDayTimes.nauticalDawn || latestEnd;
            const end = astronomicalEnd.getTime() < latestEnd.getTime() ? astronomicalEnd : latestEnd;
            return {
                start,
                end: end.getTime() > start.getTime() ? end : latestEnd
            };
        }

        function buildMilkyWayTimeSlots(targetDateString, coord) {
            const { start, end } = getMilkyWaySlotRange(targetDateString, coord);
            const slots = [];
            for (let cursor = ceilDateToHalfHour(start); cursor.getTime() <= end.getTime(); cursor = new Date(cursor.getTime() + (30 * 60000))) {
                slots.push(new Date(cursor));
            }
            return slots;
        }

        function getNearestWeatherWindow(hourlyTimes = [], slotDate) {
            let best = null;
            let bestDiff = Number.POSITIVE_INFINITY;
            hourlyTimes.forEach((entry) => {
                const diff = Math.abs(entry.date.getTime() - slotDate.getTime());
                if (diff < bestDiff) {
                    bestDiff = diff;
                    best = entry;
                }
            });
            return bestDiff <= 90 * 60000 ? best : null;
        }

        function getLongitudeDistance(a, b) {
            const diff = Math.abs(a - b);
            return Math.min(diff, 360 - diff);
        }

        function parseOvationPoints(payload) {
            const rawPoints = Array.isArray(payload?.coordinates)
                ? payload.coordinates
                : Array.isArray(payload?.data)
                    ? payload.data
                    : Array.isArray(payload)
                        ? payload
                        : [];

            return rawPoints.map((point) => {
                if (Array.isArray(point)) {
                    const numeric = point.map(toNumber).filter(v => v != null);
                    if (numeric.length < 3) return null;
                    const [a, b, value] = numeric;
                    if (Math.abs(a) <= 90 && Math.abs(b) <= 180) return { lat: a, lon: b, value };
                    if (Math.abs(a) <= 180 && Math.abs(b) <= 90) return { lat: b, lon: a, value };
                    return null;
                }

                if (point && typeof point === 'object') {
                    const lat = toNumber(point.lat ?? point.latitude);
                    const lon = toNumber(point.lon ?? point.longitude ?? point.lng);
                    const value = toNumber(point.value ?? point.probability ?? point.intensity ?? point.aurora);
                    if (lat != null && lon != null && value != null) return { lat, lon, value };
                }

                return null;
            }).filter(Boolean);
        }

        function parseLatestKp(payload) {
            const rows = Array.isArray(payload?.data) ? payload.data : (Array.isArray(payload) ? payload : []);
            for (let i = rows.length - 1; i >= 0; i--) {
                const row = rows[i];
                if (typeof row === 'number') return row;
                if (Array.isArray(row)) {
                    for (let j = row.length - 1; j >= 0; j--) {
                        const value = toNumber(row[j]);
                        if (value != null) return value;
                    }
                }
                if (row && typeof row === 'object') {
                    const known = toNumber(row.kp_index ?? row.kp ?? row.kpIndex ?? row.planetary_k_index);
                    if (known != null) return known;
                    const dynamicKey = Object.keys(row).find(key => /kp/i.test(key) && toNumber(row[key]) != null);
                    if (dynamicKey) return toNumber(row[dynamicKey]);
                }
            }
            return null;
        }

        function getNearestOvationPoint(points, coord) {
            let nearest = null;
            let bestDistance = Number.POSITIVE_INFINITY;

            points.forEach((point) => {
                const latDiff = point.lat - coord.lat;
                const lonDiff = getLongitudeDistance(point.lon, coord.lon);
                const distance = latDiff * latDiff + lonDiff * lonDiff;
                if (distance < bestDistance) {
                    bestDistance = distance;
                    nearest = point;
                }
            });

            return nearest;
        }

        function getUpcomingNightWindows(times = []) {
            const windows = [];
            const targetHours = new Set([21, 0, 3]);
            times.forEach((iso, index) => {
                const hour = Number(String(iso).slice(11, 13));
                if (targetHours.has(hour)) {
                    windows.push({ index, label: String(iso).slice(11, 16), time: iso });
                }
            });
            return windows.slice(0, 3);
        }

        function getAuroraSummary(level, details) {
            const { cloudCover, kp, auroraActivityScore } = details;
            if (currentLang === 'zh') {
                if (level === 'excellent') return `地磁活動很強，雲量也壓得住，今晚很值得追光。`;
                if (level === 'high') return `地磁活動不錯，若雲量維持在 ${cloudCover}% 左右，今晚有機會看到極光。`;
                if (level === 'moderate') return `極光活躍度約 ${auroraActivityScore} 分，建議挑雲量更低的時段再出門。`;
                return `目前 Kp 約 ${kp ?? '--'}，加上天空條件普通，今晚看到極光的機會偏低。`;
            }

            if (level === 'excellent') return `Strong geomagnetic activity and relatively clear skies make tonight worth chasing.`;
            if (level === 'high') return `Aurora activity looks healthy. If cloud cover stays near ${cloudCover}%, viewing chances are good.`;
            if (level === 'moderate') return `Moderate aurora potential. A clearer time window would improve your odds.`;
            return `Weak geomagnetic activity and patchy sky conditions make viewing less likely tonight.`;
        }

        function calculateAuroraVisibility(cityKey, ovationPayload, kpPayload, weatherPayload) {
            const coord = COORDS[cityKey];
            if (!coord) throw new Error('Unknown aurora city');

            const points = parseOvationPoints(ovationPayload);
            if (!points.length) throw new Error('No aurora forecast grid');

            const nearestPoint = getNearestOvationPoint(points, coord);
            if (!nearestPoint) throw new Error('No nearby aurora grid point');

            const maxOvationValue = points.reduce((max, point) => Math.max(max, point.value), 0);
            const ovationScore = maxOvationValue > 100
                ? clamp(Math.round((nearestPoint.value / maxOvationValue) * 100), 0, 100)
                : clamp(Math.round(nearestPoint.value), 0, 100);

            const kp = parseLatestKp(kpPayload);
            const kpScore = getKpScore(kp);
            const auroraActivityScore = clamp(Math.round((ovationScore * 0.7) + (kpScore * 0.3)), 0, 100);

            const hourly = weatherPayload?.hourly || {};
            const windows = getUpcomingNightWindows(hourly.time || []);
            if (!windows.length) throw new Error('No night weather windows');

            const evaluatedWindows = windows.map((windowInfo) => {
                const cloudCover = Math.round(toNumber(hourly.cloud_cover?.[windowInfo.index]) ?? 100);
                const rainProbability = Math.round(toNumber(hourly.precipitation_probability?.[windowInfo.index]) ?? 0);
                const weatherPenalty = Math.min(getCloudPenalty(cloudCover) + getRainPenalty(rainProbability), 70);
                const score = clamp(Math.round(auroraActivityScore - weatherPenalty), 0, 100);

                return {
                    ...windowInfo,
                    cloudCover,
                    rainProbability,
                    weatherPenalty,
                    score
                };
            }).sort((a, b) => b.score - a.score);

            const bestWindow = evaluatedWindows[0];
            const level = getAuroraLevel(bestWindow.score);
            const forecastTime = ovationPayload?.["Forecast Time"]
                || ovationPayload?.forecast_time
                || ovationPayload?.Forecast_Time
                || weatherPayload?.current_weather?.time
                || weatherPayload?.hourly?.time?.[0];

            return {
                cityKey,
                score: bestWindow.score,
                level,
                kp,
                updatedAt: forecastTime,
                bestViewingHours: evaluatedWindows.map(windowInfo => windowInfo.label),
                summary: getAuroraSummary(level, {
                    cloudCover: bestWindow.cloudCover,
                    kp,
                    auroraActivityScore
                }),
                components: {
                    auroraActivityScore,
                    ovationScore,
                    kpScore,
                    cloudCover: bestWindow.cloudCover,
                    precipitationProbability: bestWindow.rainProbability,
                    weatherPenalty: bestWindow.weatherPenalty,
                    nearestOvationValue: Math.round(nearestPoint.value)
                },
                source: 'NOAA SWPC + Open-Meteo'
            };
        }

        async function fetchAuroraVisibility(cityKey, options = {}) {
            const { force = false } = options;
            if (!cityKey || !COORDS[cityKey]) return null;

            const cached = auroraCache.get(cityKey);
            if (!force && cached && (Date.now() - cached.timestamp) < AURORA_CACHE_TTL) {
                auroraState = { status: 'success', city: cityKey, data: cached.data, error: '' };
                if (isOverviewPageSelection()) renderOverview(document.getElementById('content-display'), translations[currentLang]);
                return cached.data;
            }

            if (!force && auroraState.status === 'loading' && auroraState.city === cityKey) {
                return null;
            }

            auroraState = { status: 'loading', city: cityKey, data: null, error: '' };
            if (isOverviewPageSelection()) renderOverview(document.getElementById('content-display'), translations[currentLang]);

            try {
                const coord = COORDS[cityKey];
                const [ovationRes, kpRes, weatherRes] = await Promise.all([
                    fetch('https://services.swpc.noaa.gov/json/ovation_aurora_latest.json'),
                    fetch('https://services.swpc.noaa.gov/json/planetary_k_index_1m.json'),
                    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coord.lat}&longitude=${coord.lon}&hourly=cloud_cover,precipitation_probability&forecast_days=2&timezone=${encodeURIComponent(NZ_TIMEZONE)}`)
                ]);

                if (!ovationRes.ok || !kpRes.ok || !weatherRes.ok) {
                    throw new Error('Aurora upstream response failed');
                }

                const [ovationPayload, kpPayload, weatherPayload] = await Promise.all([
                    ovationRes.json(),
                    kpRes.json(),
                    weatherRes.json()
                ]);

                const data = calculateAuroraVisibility(cityKey, ovationPayload, kpPayload, weatherPayload);
                auroraCache.set(cityKey, { timestamp: Date.now(), data });
                auroraState = { status: 'success', city: cityKey, data, error: '' };
                if (isOverviewPageSelection()) renderOverview(document.getElementById('content-display'), translations[currentLang]);
                return data;
            } catch (error) {
                console.warn('Aurora fetch failed', error);
                auroraState = { status: 'error', city: cityKey, data: null, error: String(error.message || error) };
                if (isOverviewPageSelection()) renderOverview(document.getElementById('content-display'), translations[currentLang]);
                return null;
            }
        }

        function refreshAuroraVisibility(force = false) {
            const availableCities = ensureAuroraSelection();
            const cityKey = availableCities.includes(auroraSelectedCity) ? auroraSelectedCity : availableCities[0];
            if (!cityKey) return;
            fetchAuroraVisibility(cityKey, { force });
        }

        function setSkyConditionsStop(stopId) {
            const stop = getSkyConditionsStops().find(item => item.id === stopId);
            if (!stop || !COORDS[stop.cityKey]) return;
            skyConditionsSelectedStop = stop.id;
            auroraSelectedCity = stop.cityKey;
            auroraState = { status: 'idle', city: stop.cityKey, data: null, error: '' };
            milkyWayState = { status: 'idle', city: stop.cityKey, data: null, error: '' };
            if (isOverviewPageSelection()) renderOverview(document.getElementById('content-display'), translations[currentLang]);
            refreshAuroraVisibility(false);
            refreshMilkyWayVisibility(false);
        }

        function calculateMilkyWayVisibility(cityKey, options = {}) {
            const { weatherPayload = null, targetDateString = getMilkyWayTargetDate(), weatherPending = false } = options;
            const coord = COORDS[cityKey];
            if (!coord) throw new Error('Unknown Milky Way city');

            const hourly = weatherPayload?.hourly || {};
            const targetSlots = buildMilkyWayTimeSlots(targetDateString, coord);
            const hourlyEntries = weatherPayload
                ? (hourly.time || []).map((time, index) => {
                    const date = parseTimeZoneDateTimeValue(time, NZ_TIMEZONE);
                    return Number.isNaN(date.getTime()) ? null : { time, index, date };
                }).filter(Boolean)
                : [];
            const windows = weatherPayload
                ? targetSlots.map((slotDate) => ({
                    time: slotDate,
                    weatherWindow: getNearestWeatherWindow(hourlyEntries, slotDate)
                })).filter(({ weatherWindow }) => Boolean(weatherWindow))
                : targetSlots.map((slotDate) => ({ time: slotDate, weatherWindow: null }));

            if (!windows.length) throw new Error('No Milky Way windows');

            const evaluated = windows.map(({ time, weatherWindow }) => {
                const slotDate = parseTimeZoneDateTimeValue(time, NZ_TIMEZONE);
                const sunAltitude = degrees(SunCalc.getPosition(slotDate, coord.lat, coord.lon).altitude);
                const moonPosition = SunCalc.getMoonPosition(slotDate, coord.lat, coord.lon);
                const moonIllumination = SunCalc.getMoonIllumination(slotDate).fraction;
                const cloudCover = weatherPayload ? Math.round(toNumber(hourly.cloud_cover?.[weatherWindow.index]) ?? 100) : null;
                const darkSky = sunAltitude <= -18;
                const moonAltitude = degrees(moonPosition.altitude);
                const moonAboveHorizon = moonAltitude > 0;
                const moonAzimuth = getAzimuthDegreesFromSunCalc(moonPosition.azimuth);
                const coreAltitude = getGalacticCoreAltitude(slotDate, coord);
                const coreAzimuth = getGalacticCoreAzimuth(slotDate, coord);
                const coreScore = darkSky ? getMilkyWayCoreScore(coreAltitude) : 0;
                const cloudPenalty = weatherPayload ? getCloudPenalty(cloudCover) : 0;
                const moonPenalty = getMilkyWayMoonPenalty(moonAboveHorizon, moonIllumination);
                const score = darkSky ? clamp(Math.round(coreScore - cloudPenalty - moonPenalty), 0, 100) : 0;
                const moonStatus = getMoonStatusInfo(slotDate, coord, moonAboveHorizon);

                return {
                    time: slotDate,
                    sortKey: slotDate.getTime(),
                    label: formatLocalTimeLabel(slotDate),
                    score,
                    darkSky,
                    coreAltitude,
                    coreScore,
                    cloudCover,
                    cloudPenalty,
                    moonAboveHorizon,
                    moonAltitude,
                    moonAzimuth,
                    moonStatus,
                    moonIllumination,
                    moonPenalty,
                    coreAzimuth
                };
            }).sort((a, b) => b.score - a.score);

            const best = evaluated[0];
            const level = getAuroraLevel(best.score);
            const bestViewingSlots = evaluated
                .filter(slot => slot.score >= Math.max(best.score - 10, 35))
                .sort((a, b) => a.sortKey - b.sortKey);

            return {
                cityKey,
                score: best.score,
                level,
                updatedAt: best?.time || weatherPayload?.hourly?.time?.[0] || `${targetDateString}T22:00:00`,
                bestViewingWindow: (bestViewingSlots.length ? bestViewingSlots : [best]).map(slot => slot.label),
                windows: evaluated.sort((a, b) => a.sortKey - b.sortKey),
                summary: getMilkyWaySummary(level, {
                    cloudCover: best.cloudCover ?? 0,
                    moonIllumination: best.moonIllumination,
                    darkSky: best.darkSky,
                    weatherPending
                }),
                components: {
                    weatherPending,
                    mode: weatherPending ? 'astronomy' : 'forecast',
                    targetDate: targetDateString,
                    darkSky: best.darkSky,
                    coreAltitude: Math.round(best.coreAltitude),
                    coreScore: best.coreScore,
                    cloudCover: best.cloudCover,
                    cloudPenalty: best.cloudPenalty,
                    moonAboveHorizon: best.moonAboveHorizon,
                    moonAltitude: best.moonAltitude,
                    moonAzimuth: best.moonAzimuth,
                    moonStatusKey: best.moonStatus.key,
                    moonIllumination: best.moonIllumination,
                    moonPenalty: best.moonPenalty,
                    coreAzimuth: best.coreAzimuth
                },
                source: weatherPending ? 'SunCalc' : 'SunCalc + Open-Meteo'
            };
        }

        async function fetchMilkyWayVisibility(cityKey, options = {}) {
            const { force = false } = options;
            if (!cityKey || !COORDS[cityKey]) return null;
            const targetDateString = getMilkyWayTargetDate();
            const daysFromToday = getDaysFromToday(targetDateString);
            const weatherPending = isMilkyWayWeatherPending(daysFromToday);
            const cacheKey = `${cityKey}:${targetDateString}:${weatherPending ? 'astro' : 'forecast'}`;

            const cached = milkyWayCache.get(cacheKey);
            if (!force && cached && (Date.now() - cached.timestamp) < MILKY_WAY_CACHE_TTL) {
                milkyWayState = { status: 'success', city: cityKey, data: cached.data, error: '' };
                if (isOverviewPageSelection()) renderOverview(document.getElementById('content-display'), translations[currentLang]);
                return cached.data;
            }

            if (!force && milkyWayState.status === 'loading' && milkyWayState.city === cityKey) {
                return null;
            }

            milkyWayState = { status: 'loading', city: cityKey, data: null, error: '' };
            if (isOverviewPageSelection()) renderOverview(document.getElementById('content-display'), translations[currentLang]);

            try {
                const coord = COORDS[cityKey];
                let data;
                if (weatherPending) {
                    data = calculateMilkyWayVisibility(cityKey, { targetDateString, weatherPending: true });
                } else {
                    const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coord.lat}&longitude=${coord.lon}&hourly=cloud_cover&forecast_days=${MILKY_WAY_WEATHER_FORECAST_DAYS}&timezone=${encodeURIComponent(NZ_TIMEZONE)}`);
                    if (!response.ok) throw new Error('Milky Way weather response failed');

                    const weatherPayload = await response.json();
                    try {
                        data = calculateMilkyWayVisibility(cityKey, { weatherPayload, targetDateString, weatherPending: false });
                    } catch (error) {
                        // If forecast data does not include the selected date/time, degrade to astronomy-only mode.
                        if (String(error?.message || '').includes('No Milky Way windows')) {
                            data = calculateMilkyWayVisibility(cityKey, { targetDateString, weatherPending: true });
                        } else {
                            throw error;
                        }
                    }
                }
                milkyWayCache.set(cacheKey, { timestamp: Date.now(), data });
                milkyWayState = { status: 'success', city: cityKey, data, error: '' };
                if (isOverviewPageSelection()) renderOverview(document.getElementById('content-display'), translations[currentLang]);
                return data;
            } catch (error) {
                console.warn('Milky Way fetch failed', error);
                milkyWayState = { status: 'error', city: cityKey, data: null, error: String(error.message || error) };
                if (isOverviewPageSelection()) renderOverview(document.getElementById('content-display'), translations[currentLang]);
                return null;
            }
        }

        function refreshMilkyWayVisibility(force = false) {
            const cityKey = ensureAuroraSelection().includes(auroraSelectedCity) ? auroraSelectedCity : ensureAuroraSelection()[0];
            if (!cityKey) return;
            fetchMilkyWayVisibility(cityKey, { force });
        }

        const MilkyWayWindowModule = {
            getCurrentData() {
                const selectedStop = getSelectedSkyConditionsStop();
                const targetDateString = selectedStop?.actualDate || getMilkyWayTargetDate();
                if (milkyWayState.city === auroraSelectedCity && milkyWayState.data?.components?.targetDate === targetDateString) {
                    return milkyWayState.data;
                }
                return null;
            },

            getRecommendedIndexes(data) {

                const indexes = [];
                (data?.windows || []).forEach((slot, index) => {

                const recommendedIndexes = this.getRecommendedIndexes(data);
                const recommendedSet = new Set(recommendedIndexes);
                const isRecommended = recommendedSet.has(clampedIndex);

                const recommendedLabelText = recommendedSlots.length
                    ? recommendedSlots.map(slot => slot.label).join(' · ')
                    : '--';

            preview(windowIndex) {
                const data = this.getCurrentData();
                const detail = document.getElementById('milky-way-window-detail');
                if (!detail || !data?.windows?.length) return;

                const clampedIndex = clamp(windowIndex, 0, data.windows.length - 1);
                const windowInfo = data.windows[clampedIndex];
                if (!windowInfo) return;

                const ui = translations[currentLang];
                const coreDirectionLabel = getMilkyWayCoreDirectionLabel(windowInfo.coreAzimuth, windowInfo.coreAltitude, currentLang);
                const moonStatusKey = windowInfo.moonStatus?.key || windowInfo.moonStatusKey || 'set';
                const moonStatusLabel = getMilkyWayMoonStatusLabel(moonStatusKey, currentLang);
                const moonInterferenceLabel = getMilkyWayMoonInterferenceLabel(windowInfo.moonAboveHorizon, windowInfo.moonIllumination, currentLang);
                const moonDirectionLabel = `${ui.milkyWayMoonDirection}: ${windowInfo.moonAboveHorizon ? `${getCompassLabel(windowInfo.moonAzimuth, currentLang)} · ${Math.round(windowInfo.moonAltitude)}°` : ui.milkyWayBelowHorizon}`;

                const recommendedIndexes = this.getRecommendedIndexes(data);
                const recommendedSet = new Set(recommendedIndexes);
                const isRecommended = recommendedSet.has(clampedIndex);
                const recommendedSlots = recommendedIndexes.map(index => data.windows[index]).filter(Boolean);
                const recommendedLabelText = recommendedSlots.length
                    ? recommendedSlots.map(slot => slot.label).join(' · ')
                    : '--';

                activeMilkyWayWindowIndex = clampedIndex;
                activeMilkyWayWindowKey = String(windowInfo.sortKey);

                const titleEl = detail.querySelector('[data-milkyway-window-title]');
                if (titleEl) titleEl.textContent = `${getDisplayCityName(data.cityKey, currentLang)} · ${windowInfo.label}`;

                const currentLabelEl = detail.querySelector('[data-milkyway-current-label]');
                if (currentLabelEl) currentLabelEl.textContent = windowInfo.label;

                const seekInput = detail.querySelector('[data-ui-action="milkyway-seek"]');
                if (seekInput && String(seekInput.value) !== String(clampedIndex)) {
                    seekInput.value = String(clampedIndex);
                }

                const skyDiagramEl = detail.querySelector('[data-milkyway-sky-diagram]');
                if (skyDiagramEl) skyDiagramEl.innerHTML = renderMilkyWayWindowSkyDiagram(windowInfo, ui);

                const coreDirectionEl = detail.querySelector('[data-milkyway-core-direction]');
                if (coreDirectionEl) coreDirectionEl.textContent = coreDirectionLabel;

                const moonStatusEl = detail.querySelector('[data-milkyway-moon-status]');
                if (moonStatusEl) moonStatusEl.textContent = moonStatusLabel;

                const moonDirectionEl = detail.querySelector('[data-milkyway-moon-direction]');
                if (moonDirectionEl) moonDirectionEl.textContent = moonDirectionLabel;

                const moonInterferenceEl = detail.querySelector('[data-milkyway-moon-interference]');
                if (moonInterferenceEl) moonInterferenceEl.textContent = moonInterferenceLabel;

                const moonIlluminationEl = detail.querySelector('[data-milkyway-moon-illumination]');
                if (moonIlluminationEl) moonIlluminationEl.textContent = `${Math.round(windowInfo.moonIllumination * 100)}%`;

                const cloudCoverEl = detail.querySelector('[data-milkyway-cloud-cover]');
                if (cloudCoverEl) cloudCoverEl.textContent = windowInfo.cloudCover != null ? `${windowInfo.cloudCover}%` : '--';

                const recommendationEl = detail.querySelector('[data-milkyway-recommendation]');
                if (recommendationEl) {
                    recommendationEl.className = `mt-3 rounded-xl px-3.5 py-2.5 text-sm font-bold ${isRecommended ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-slate-100 text-slate-600 border border-slate-200'}`;
                    recommendationEl.textContent = isRecommended ? `✓ ${ui.milkyWayRecommendedNow}` : `${ui.milkyWayRecommendedRange}: ${recommendedLabelText}`;
                }

                detail.querySelectorAll('[data-ui-action="milkyway-jump-window"]').forEach((button) => {
                    const active = String(button.dataset.windowKey) === String(windowInfo.sortKey);
                    button.classList.toggle('ring-2', active);
                    button.classList.toggle('ring-amber-400', active);
                });
            },

            setBySortKey(sortKey) {
                const data = this.getCurrentData();
                const index = data?.windows?.findIndex(slot => String(slot.sortKey) === String(sortKey));
                if (!data || index == null || index < 0) return;
                this.renderDetail(data, index);
            },

            setByIndex(windowIndex) {
                const data = this.getCurrentData();
                if (!data?.windows?.length) return;
                this.renderDetail(data, windowIndex);
            },

            open(sortKey) {
                const data = this.getCurrentData();
                const targetIndex = data?.windows?.findIndex(slot => String(slot.sortKey) === String(sortKey));
                if (!data || targetIndex == null || targetIndex < 0) return;

                this.renderDetail(data, targetIndex);
                const detail = document.getElementById('milky-way-window-detail');
                if (detail) detail.scrollTop = 0;

                const modal = document.getElementById('milky-way-window-modal');
                const backdrop = document.getElementById('milky-way-window-backdrop');
                const content = document.getElementById('milky-way-window-content');
                modal.classList.remove('hidden');

                    content.classList.replace('opacity-0', 'opacity-100');
                    content.classList.replace('scale-95', 'scale-100');
                }, 10);

                const backdrop = document.getElementById('milky-way-window-backdrop');

        function getSkyConditionsSummary(ui) {
            const selectedStop = getSelectedSkyConditionsStop();
            const basedOnText = selectedStop ? getSkyConditionsBasedOnText(ui, selectedStop) : '';
            const auroraHighlight = auroraState.status === 'success'
                && auroraState.data
                && ['high', 'excellent'].includes(auroraState.data.level);
            if (auroraState.status === 'loading') {
                return {
                    headline: ui.skyConditionsLoading,
                    detail: [currentLang === 'zh' ? '正在整理今晚最值得看的天空條件。' : 'Preparing the best viewing call for tonight.', basedOnText].filter(Boolean).join(' · ')
                };
            }

            if (auroraState.status === 'error') {
                return {
                    headline: ui.skyConditionsUnavailable,
                    detail: [currentLang === 'zh' ? '稍後可再重新整理一次。' : 'Try refreshing again in a moment.', basedOnText].filter(Boolean).join(' · ')
                };
            }

            if (milkyWayState.status === 'success' && milkyWayState.data) {
                const cityName = getDisplayCityName(milkyWayState.data.cityKey, currentLang);
                const milkyLevel = getMilkyWayLevelLabel(milkyWayState.data.level);
                const milkyTime = milkyWayState.data.bestViewingWindow[0] || '--';
                const milkyMode = milkyWayState.data.components.weatherPending ? ui.milkyWayWeatherPending : ui.milkyWayModeForecast;
                const auroraNote = auroraHighlight
                    ? (currentLang === 'zh'
                        ? `極光也值得留意${auroraState.data.bestViewingHours[0] ? `，${auroraState.data.bestViewingHours[0]}附近較好` : ''}`
                        : `Aurora is also worth watching${auroraState.data.bestViewingHours[0] ? ` around ${auroraState.data.bestViewingHours[0]}` : ''}`)
                    : '';

                return {
                    headline: `${cityName}${currentLang === 'zh' ? '今晚先看銀河' : ' is best for Milky Way tonight'}`,
                    detail: [
                        `${ui.skyConditionsMilkyWayPrefix} ${milkyLevel} · ${milkyTime}${currentLang === 'zh' ? '後較好' : ' onward looks best'} · ${milkyMode}`,
                        auroraNote,
                        basedOnText
                    ].filter(Boolean).join(' · ')
                };
            }

            if (auroraState.status === 'success' && auroraState.data) {
                const cityName = getDisplayCityName(auroraState.data.cityKey, currentLang);
                const auroraLevel = getAuroraLevelLabel(auroraState.data.level);
                const auroraTime = auroraState.data.bestViewingHours[0] || '--';

                return {
                    headline: `${cityName}${currentLang === 'zh' ? '今晚可留意極光' : ' may be worth checking for aurora tonight'}`,
                    detail: [ `${ui.skyConditionsSummaryPrefix} ${auroraLevel} · ${auroraTime}${currentLang === 'zh' ? '較佳' : ' looks better'}`, basedOnText ].filter(Boolean).join(' · ')
                };
            }

            return {
                headline: ui.skyConditionsLoading,
                detail: [currentLang === 'zh' ? '正在整理今晚最值得看的天空條件。' : 'Preparing the best viewing call for tonight.', basedOnText].filter(Boolean).join(' · ')
            };
        }

        async function executePrint(includePhotos) {
            const ui = translations[currentLang];
            const printArea = document.getElementById('print-area');
            
            // Close modal first
            closePrintModal();

            let printHtml = `<h1 style="font-size: 2.5rem; font-weight: 900; color: #1e3a8a; margin-bottom: 40px; border-bottom: 4px solid #3b82f6; padding-bottom: 20px;">${ui.header}</h1>`;
            
            itinerary.forEach((day, dayIndex) => {
                const lang = day[currentLang];
                const hotel = getAccommodationForDay(dayIndex, currentLang);
                
                printHtml += `
                    <div class="day-block">
                        <div class="day-header">
                            <span>Day ${dayIndex + 1} | ${lang.title}</span>
                            <span class="city-badge">${day.city[currentLang]}</span>
                        </div>
                        <div class="timeline">
                            ${lang.timeline.map(t => `
                                <div class="timeline-item">
                                    <div class="timeline-time">${t[0]}</div>
                                    <div class="timeline-desc">${t[1]}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="hotel-info">🛏️ ${ui.hotelLabel}: ${hotel}</div>
                `;

                if (includePhotos) {
                    const dayMemories = tempAllMemories.filter(m => m.spotKey.startsWith(`d${dayIndex}_`));
                    if (dayMemories.length > 0) {
                        printHtml += `<div class="photo-grid">`;
                        dayMemories.forEach(m => {
                            printHtml += `
                                <div class="photo-item">
                                    <img src="${m.photoData}" class="photo-img">
                                    ${m.note ? `<div class="photo-note">"${m.note}"</div>` : ''}
                                </div>
                            `;
                        });
                        printHtml += `</div>`;
                    }
                }

                printHtml += `</div>`;
            });
            
            printArea.innerHTML = printHtml;

            // CRITICAL for iOS: Wait for images to load and DOM to settle
            // Even simple text rendering needs a small beat on mobile Safari
            setTimeout(() => {
                window.print();
                
                // Cleanup using standard events which are more reliable
                const cleanup = () => {
                    printArea.innerHTML = '';
                    window.removeEventListener('afterprint', cleanup);
                };
                window.addEventListener('afterprint', cleanup);
                
                // Fallback cleanup if afterprint doesn't fire (some older iOS versions)
                setTimeout(cleanup, 2000);
            }, 500);
        }

        async function fetchExchangeRate() {
            try {
                // Fetch latest exchange rate from a free public API
                const res = await fetch('https://api.exchangerate-api.com/v4/latest/NZD');
                const data = await res.json();
                const rawRate = data.rates['TWD'];
                const twdRateWithFee = (rawRate * 1.015).toFixed(2);
                currentNZDRate = parseFloat(twdRateWithFee);
                
                const note = translations['zh'].nzdFeeNote.replace('{rate}', currentNZDRate);
                const noteEn = translations['en'].nzdFeeNote.replace('{rate}', currentNZDRate);

                // Update internal translation data
                translations['zh'].notices.find(n => n.id === 'exchangeRate').content = note;
                translations['en'].notices.find(n => n.id === 'exchangeRate').content = noteEn;
                
                // Update converter info if open
                const rateInfo = document.getElementById('converter-rate-info');
                if (rateInfo) {
                    rateInfo.innerText = currentLang === 'zh' ? note : noteEn;
                }
                
                // Re-render UI to display fetched rate if we are on screens that surface the rate
                if (isOverviewPageSelection() && document.getElementById('notice-board')) {
                    updateUI(); 
                } else if (isCostsPageSelection()) {
                    updateUI();
                }
            } catch (e) {
                console.warn('Failed to fetch exchange rate', e);
                const fallbackZh = "1 NZD ≈ 19.8 TWD (含手續費)";
                const fallbackEn = "1 NZD ≈ 19.8 TWD (incl. service fee)";
                translations['zh'].notices.find(n => n.id === 'exchangeRate').content = fallbackZh;
                translations['en'].notices.find(n => n.id === 'exchangeRate').content = fallbackEn;
                if ((isOverviewPageSelection() && document.getElementById('notice-board')) || isCostsPageSelection()) updateUI();

        async function fetchWeather(city) {
            const box = document.getElementById('weather-box');
            if (isOverviewPageSelection() || !city) { 
                box.classList.add('hidden'); 
                box.classList.add('pointer-events-none');
                return; 
            }
            box.classList.remove('hidden');
            box.classList.remove('pointer-events-none');
            const cityKey = getCityKeyFromName(city);
            const coord = cityKey ? COORDS[cityKey] : COORDS["Queenstown"];

            box.href = `https://www.google.com/search?q=${cityKey || city}+weather`;
            const displayCity = cityKey ? getDisplayCityName(cityKey, currentLang) : city;
            document.getElementById('weather-city').innerText = displayCity;
            document.getElementById('weather-temp').innerText = "...";
            
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coord.lat}&longitude=${coord.lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=${encodeURIComponent(NZ_TIMEZONE)}`);
                const data = await res.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                const maxTemp = Math.round(data.daily.temperature_2m_max[0]);
                const minTemp = Math.round(data.daily.temperature_2m_min[0]);
                
                // Simplified WMO code mapping
                let desc = "Clear";
                if (code >= 1 && code <= 3) desc = "Cloudy";
                if (code >= 45 && code <= 48) desc = "Foggy";
                if (code >= 51 && code <= 67) desc = "Rain";
                if (code >= 71 && code <= 77) desc = "Snow";
                if (code >= 80 && code <= 99) desc = "Storm";

                document.getElementById('weather-temp').innerText = `${temp}° (${maxTemp}°/${minTemp}°)`;
                document.getElementById('weather-icon-container').innerHTML = getWeatherIcon(desc);
            } catch (e) {
                console.warn('Weather fetch failed', e);
                document.getElementById('weather-temp').innerText = "N/A";
            }
        }

        function updateChecklistProgressRing() {
            let saved = JSON.parse(localStorage.getItem('nz_travel_checklist') || '{}');
            let totalItems = 0;
            let checkedItems = 0;
            checklist.forEach(cat => {
                totalItems += cat.items.length;
                cat.items.forEach((_, idx) => {
                    if(saved[`${cat.id}_${idx}`]) checkedItems++;
                });
            });
            const progress = totalItems === 0 ? 0 : Math.round((checkedItems / totalItems) * 100);
            const dashoffset = Math.round(100 - progress);

            const pctText = document.getElementById('progress-pct-text');
            const svgRing = document.getElementById('progress-svg-ring');
            if(pctText && svgRing) {
                pctText.innerText = progress + '%';
                svgRing.style.strokeDashoffset = dashoffset;
            }
        }

        function importItinerary() {
            const ui = translations[currentLang];
            const raw = document.getElementById('io-textarea').value;
            let normalized = null;
            let customCoordsData = {};
            let importedBudgetSettings = getDefaultBudgetSettings();
            let importedBookings = [];
            let importedExpenses = [];

            try {
                const parsed = parseJsonWithImportFallback(raw);
                const importPayload = parseImportedItineraryPayload(parsed);
                customCoordsData = importPayload.customCoordsData || {};
                importedBudgetSettings = normalizeBudgetSettings(importPayload.budgetSettingsData || getDefaultBudgetSettings());
                importedBookings = normalizeBookingsPayload(importPayload.bookingsData || []);
                importedExpenses = normalizeExpensesPayload(importPayload.expensesData || []);
                normalized = normalizeItineraryPayload(importPayload.itineraryData, DEFAULT_ITINERARY);
                if (!normalized) throw new Error("Invalid format");
            } catch (e) {
                alert(ui.importError);
                return;
            }

            try {
                itinerary = normalized;
                const importedCustomMap = normalizeCustomCityCoordsMap(customCoordsData);
                applyCustomCityCoordsMap(mergeCustomCityCoordsMaps(customCityCoords, importedCustomMap), { persist: true });
                syncCustomCityCoordsFromItinerary({ persist: true, mergeStored: true });
                budgetSettings = importedBudgetSettings;
                bookings = importedBookings;
                expenses = importedExpenses;
                activeBudgetFilter = 'all';
                saveItinerary();
                saveBudgetData();
            } catch (e) {
                console.error('Failed to apply imported itinerary.', e);
                alert(ui.importError);
                return;
            }

            // UI refresh issues should not flip a successful import into an error alert.
            try {
                closeIOModal();
                updateUI();
            } catch (e) {
                console.warn('Import succeeded but UI refresh encountered an issue.', e);
            }

            alert(ui.importDone);
        }

        function getFlightOverviewEntries(langCode = currentLang) {
            const fallbackLang = langCode === 'zh' ? 'en' : 'zh';
            const actualFlightPattern = langCode === 'zh'
                ? /(✈️|航班|航程|起飛|飛往|飛回|飛抵|過夜航班|國內線航程|國際線航程|轉機前往|轉國內線|[A-Z]{2,3}\s*\d{2,4}|[A-Z]{3}\s*[→-]\s*[A-Z]{3})/i
                : /(✈️|flight|depart|fly|overnight flight|domestic flight|international flight|connection to|transfer to domestic flight|[A-Z]{2,3}\s*\d{2,4}|[A-Z]{3}\s*[→-]\s*[A-Z]{3})/i;
            const supportingFlightPattern = langCode === 'zh'
                ? /(機場|轉乘|報到|還車)/i
                : /(airport|transfer|check-?in|car return)/i;

            return itinerary.map((day, index) => {
                const langDay = day?.[langCode] || day?.en || day?.zh || {};
                const title = typeof langDay.title === 'string' ? langDay.title : '';
                const timeline = Array.isArray(langDay.timeline) ? langDay.timeline.map((item) => normalizeTimelineItem(item)) : [];
                const hasFlightTitle = actualFlightPattern.test(title);
                const hasFlightItem = timeline.some((item) => {
                    const combinedText = [item[0], item[1], item[2], item[5]].filter(Boolean).join(' ');
                    return actualFlightPattern.test(combinedText);
                });
                if (!hasFlightTitle && !hasFlightItem) return null;

                const items = timeline.filter((item) => {
                    const combinedText = [item[0], item[1], item[2], item[5]].filter(Boolean).join(' ');
                    return actualFlightPattern.test(combinedText) || supportingFlightPattern.test(combinedText);
                });

                return {
                    dayIndex: index,
                    dateLabel: savedStartDate && day.actualDate
                        ? formatDateKeyForDisplay(day.actualDate, { month: 'numeric', day: 'numeric', weekday: 'short' })
                        : (day.date || `Day ${String(index + 1).padStart(2, '0')}`),
                    title,
                    city: day?.city?.[langCode] || day?.city?.[fallbackLang] || '',
                    items
                };
            }).filter(Boolean);
        }

            if (filterKey === 'all') return true;
            return item.type === filterKey;
        }

            if (filterKey === 'all') return true;
            return item.category === filterKey;
        }

            return {

                filteredExpenses: expenses.filter(item => matchesBudgetFilterForExpense(item, filterKey))
            };

        function formatBudgetNativeTotals(totals) {
            const parts = SUPPORTED_BUDGET_CURRENCIES
                .filter(currency => totals[currency] > 0)
                .map(currency => `${currency} ${totals[currency].toLocaleString(undefined, { maximumFractionDigits: 2 })}`);
            return parts.join(' + ') || '0';
        }

        function convertBudgetAmountToBase(amount, baseCurrency = 'TWD') {
            const safeAmount = normalizeBudgetAmount(amount, 'TWD');
            if (baseCurrency === safeAmount.currency) return safeAmount.total;
            if (safeAmount.currency === 'NZD' && baseCurrency === 'TWD') {
                return Number((safeAmount.total * getBudgetNZDRate()).toFixed(2));
            }
            if (safeAmount.currency === 'TWD' && baseCurrency === 'NZD') {
                return Number((safeAmount.total / getBudgetNZDRate()).toFixed(2));
            }
            return 0;
        }

        function calculateBudgetPerPersonTotal(items = []) {
            return items.reduce((acc, item) => {
                const safeAmount = normalizeBudgetAmount(item.amount, 'TWD');
                const sharedWith = Math.max(1, Number(item.sharedWith) || 1);
                acc += convertBudgetAmountToBase({ ...safeAmount, total: safeAmount.total / sharedWith }, budgetSettings.baseCurrency);
                return acc;
            }, 0);
        }

        function buildBudgetTotals(items = []) {
            return items.reduce((acc, item) => {
                const safeAmount = normalizeBudgetAmount(item.amount, 'TWD');
                acc[safeAmount.currency] = (acc[safeAmount.currency] || 0) + safeAmount.total;
                acc.baseTotal += convertBudgetAmountToBase(safeAmount, budgetSettings.baseCurrency);
                return acc;
            }, { TWD: 0, NZD: 0, baseTotal: 0 });
        }

        function getUpcomingBookingCount() {
            return bookings.filter(item => item.status !== 'paid').length;
        }

        function getBudgetSummaryMetrics(filteredBookings = bookings, filteredExpenses = expenses) {
            const bookedTotals = buildBudgetTotals(filteredBookings);
            const expenseTotals = buildBudgetTotals(filteredExpenses);
            const paidTotals = buildBudgetTotals([
                ...filteredBookings.filter(item => item.status === 'paid'),
                ...filteredExpenses
            ]);
            const unpaidTotals = buildBudgetTotals(filteredBookings.filter(item => item.status !== 'paid'));
            const combinedItems = [...filteredBookings, ...filteredExpenses];

            return {
                bookedTotals,
                expenseTotals,
                grandTotal: bookedTotals.baseTotal + expenseTotals.baseTotal,
                paidTotals,
                unpaidTotals,
                perPersonTotal: calculateBudgetPerPersonTotal(combinedItems),
                upcomingCount: filteredBookings.filter(item => item.status !== 'paid').length
            };
        }

                upcoming: `${metrics.upcomingCount} ${ui.budgetSummaryCountSuffix}`,
                paid: `${ui.budgetApproxPrefix} ${budgetSettings.baseCurrency} ${Math.round(metrics.paidTotals.baseTotal).toLocaleString()}`,

                perPerson: `${ui.budgetApproxPrefix} ${budgetSettings.baseCurrency} ${Math.round(metrics.perPersonTotal).toLocaleString()}`

            Object.entries(summaryValues).forEach(([key, value]) => {

        function updateBudgetField(kind, entryId, field, rawValue, options = {}) {
            const { refreshUi = true } = options;
            if (kind === 'settings') {
                if (field === 'nzdToTwdRate') {
                    const parsed = Number(rawValue);
                    budgetSettings.nzdToTwdRate = Number.isFinite(parsed) && parsed > 0 ? Number(parsed.toFixed(4)) : null;
                }
                saveBudgetData();
                if (refreshUi) {
                    updateBudgetSummaryWidgets();
                }
                return;
            }

            const collection = findBudgetCollection(kind);
            if (!collection) return;
            const target = collection.find((item) => item.id === entryId);
            if (!target) return;

            if (field === 'title') {
                setLocalizedBudgetText(target.title, currentLang, rawValue);
            } else if (field === 'vendor') {
                target.vendor = sanitizeTextInput(rawValue, { maxLength: 60 });
            } else if (field === 'notes') {
                target.notes = sanitizeTextInput(rawValue, { maxLength: 160, allowLineBreaks: true });
            } else if (field === 'type') {
                const safeType = sanitizeTextInput(rawValue, { maxLength: 30 });
                target.type = BOOKING_TYPES.includes(safeType) ? safeType : 'other';
            } else if (field === 'status') {
                const safeStatus = sanitizeTextInput(rawValue, { maxLength: 30 });
                target.status = BOOKING_STATUSES.includes(safeStatus) ? safeStatus : 'planned';
            } else if (field === 'category') {
                const safeCategory = sanitizeTextInput(rawValue, { maxLength: 30 });
                target.category = EXPENSE_CATEGORIES.includes(safeCategory) ? safeCategory : 'other';
            } else if (field === 'currency') {
                const safeCurrency = sanitizeTextInput(rawValue, { maxLength: 8 }).toUpperCase();
                target.amount.currency = SUPPORTED_BUDGET_CURRENCIES.includes(safeCurrency) ? safeCurrency : 'TWD';
            } else if (field === 'total') {
                const parsed = Number(rawValue);
                target.amount.total = Number.isFinite(parsed) ? Math.max(0, Number(parsed.toFixed(2))) : 0;
            } else if (field === 'day') {
                target.day = Math.max(1, normalizeDayNumber(rawValue, 1));
            } else if (field === 'dayStart') {
                target.dayStart = Math.max(1, normalizeDayNumber(rawValue, 1));
                if (target.dayEnd < target.dayStart) target.dayEnd = target.dayStart;
            } else if (field === 'dayEnd') {
                target.dayEnd = Math.max(target.dayStart || 1, normalizeDayNumber(rawValue, target.dayStart || 1));
            } else if (field === 'sharedWith') {
                target.sharedWith = Math.max(1, normalizeDayNumber(rawValue, 1));
            }

            saveBudgetData();
            if (!refreshUi) {
                return;
            }
            if (isCostsPageSelection() && ['type', 'status', 'category', 'day'].includes(field)) {
                updateUI();
                return;
            }
            if (!isCostsPageSelection() && kind === 'expense' && field === 'day') {
                updateUI();
                return;
            }
            updateBudgetSummaryWidgets();

        function updateClocks() {
            const now = new Date();
            const options = { hour: '2-digit', minute: '2-digit', hour12: false };
            
            try {
                const tpeStr = new Intl.DateTimeFormat('en-GB', { ...options, timeZone: 'Asia/Taipei' }).format(now);
                const nzStr = new Intl.DateTimeFormat('en-GB', { ...options, timeZone: 'Pacific/Auckland' }).format(now);

                const tpeDate = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
                const nzDate = new Date(now.toLocaleString('en-US', { timeZone: 'Pacific/Auckland' }));
                
                const dayDiff = nzDate.getDate() - tpeDate.getDate();
                let nzDisplay = nzStr;
                if (dayDiff > 0) nzDisplay += ` <span class="text-[8px] opacity-60 font-medium">+1</span>`;
                else if (dayDiff < 0) nzDisplay += ` <span class="text-[8px] opacity-60 font-medium">-1</span>`;

                if (document.getElementById('clock-tpe')) document.getElementById('clock-tpe').innerText = tpeStr;
                if (document.getElementById('clock-nz')) document.getElementById('clock-nz').innerHTML = nzDisplay;
            } catch (e) {
                console.error("Clock update failed", e);
            }
        }

        let mobileHeaderRotationInterval = null;
        function rotateMobileHeader() {
            const clock = document.querySelector('.clock-container');
            const weather = document.getElementById('weather-box');
            if (!clock || !weather) return;

            if (window.innerWidth >= 640) {
                clock.classList.remove('hidden');
                weather.classList.remove('hidden');
                clock.style.opacity = '1';
                weather.style.opacity = '1';
                return;
            }

            // Toggling with fade effect
            const isClockVisible = !clock.classList.contains('hidden');
            
            // Fade out
            if (isClockVisible) {
                clock.style.opacity = '0';
                setTimeout(() => {
                    clock.classList.add('hidden');
                    weather.classList.remove('hidden');
                    setTimeout(() => weather.style.opacity = '1', 50);
                }, 400);
            } else {
                weather.style.opacity = '0';
                setTimeout(() => {
                    weather.classList.add('hidden');
                    clock.classList.remove('hidden');
                    setTimeout(() => clock.style.opacity = '1', 50);
                }, 400);
            }
        }

        function initMobileRotation() {
            if (mobileHeaderRotationInterval) clearInterval(mobileHeaderRotationInterval);
            // On mobile, hide weather initially to save space, then rotate
            if (window.innerWidth < 640) {
                const weather = document.getElementById('weather-box');
                if (weather) {
                    weather.classList.add('hidden');
                    weather.style.opacity = '0';
                }
                const clock = document.querySelector('.clock-container');
                if (clock) clock.style.opacity = '1';
                
                mobileHeaderRotationInterval = setInterval(rotateMobileHeader, 6000);
            } else {
                const clock = document.querySelector('.clock-container');
                const weather = document.getElementById('weather-box');
                if (clock) { clock.classList.remove('hidden'); clock.style.opacity = '1'; }
                if (weather) { weather.classList.remove('hidden'); weather.style.opacity = '1'; }
            }
        }

        window.addEventListener('resize', initMobileRotation);

        // iOS Pull-to-refresh Logic
        let touchStart = 0;
        let touchLast = 0;
        const pullRefresh = document.getElementById('pull-refresh');
        const refreshIcon = document.getElementById('refresh-icon');

        window.addEventListener('touchstart', (e) => {
            if (window.scrollY <= 5) {
                touchStart = e.touches[0].pageY;
            } else {
                touchStart = 0;
            }
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (touchStart === 0) return;
            touchLast = e.touches[0].pageY;
            const distance = touchLast - touchStart;

            if (distance > 0) {
                const pullProgress = Math.min(distance / 120, 1);
                pullRefresh.style.opacity = pullProgress;
                pullRefresh.style.transform = `translateY(${Math.min(distance - 64, 20)}px)`;
                refreshIcon.style.transform = `rotate(${distance * 2}deg)`;
            }
        }, { passive: true });

        window.addEventListener('touchend', () => {
            if (touchStart === 0) return;
            const distance = touchLast - touchStart;
            
            if (distance > 80) {
                // Trigger Refresh
                pullRefresh.style.transform = `translateY(20px)`;
                refreshIcon.classList.add('fa-spin');
                if ("vibrate" in navigator) navigator.vibrate(50);
                setTimeout(() => {
                    window.location.reload();
                }, 500);
            } else {
                // Cancel Refresh
                pullRefresh.style.opacity = '0';
                pullRefresh.style.transform = `translateY(-100%)`;
            }
            touchStart = 0;
            touchLast = 0;
        }, { passive: true });

        document.addEventListener('paste', (event) => {
            const target = event.target;
            if (!target || !target.isContentEditable) return;
            event.preventDefault();
            const pastedText = (event.clipboardData || window.clipboardData).getData('text') || '';
            const safeText = sanitizeTextInput(pastedText, { maxLength: 300, allowLineBreaks: true });
            document.execCommand('insertText', false, safeText);
        });

        updateUI();
        initSnow();
        fetchExchangeRate();

        // Check if first time (no start date)
        if (!savedStartDate) {
            setTimeout(openDateModal, 800);
        } else {
            setTimeout(() => maybeShowDepartureCountdown(), 850);
        }
    </script>
    <div id="print-area"></div>
</body>
</html>
