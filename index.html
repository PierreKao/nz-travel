    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Inter:wght@400;700&display=swap');
        
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background: #0f172a; /* 預設深色背景 */
            min-height: 100vh;
        }

        /* 靜態背景層，防止滾動跳動 */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* 使用紐西蘭庫克山/蒂卡波湖一帶的經典雪景背景 */
            background: linear-gradient(rgba(15, 23, 42, 0.65), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1589802829985-817e51171b92?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        /* 飄雪特效容器 */
        .snow-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .snowflake {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: snowfall linear infinite;
        }

        @keyframes snowfall {
            0% { transform: translateY(-10px) translateX(0) scale(1); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.5; }
            100% { transform: translateY(100vh) translateX(20px) scale(0.5); opacity: 0; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .active-tab { 
            background-color: #2563eb !important; 
            color: #ffffff !important; 
            border-color: #3b82f6 !important;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .timeline-line { position: relative; }
        .timeline-line::before { 
            content: ''; position: absolute; left: 8px; top: 10px; bottom: 10px; 
            width: 2px; background: #e2e8f0; 
        }

        /* 漸層遮罩 Hint for Horizontal Scrolling */
        .scroll-mask {
            mask-image: linear-gradient(to right, transparent, black 15px, black calc(100% - 15px), transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 15px, black calc(100% - 15px), transparent);
        }

        @media (max-width: 768px) {
            .mobile-nav { 
                position: fixed; bottom: 0; left: 0; right: 0; 
                background: rgba(255,255,255,0.95); 
                z-index: 100; display: flex; overflow-x: auto; 
                padding: 8px; gap: 6px; border-top: 1px solid #e2e8f0;
            }
            main { padding-bottom: 70px; }
            .day-btn { padding: 6px 10px !important; font-size: 0.8rem !important; }
        }
    </style>
</head>

        async function fetchExchangeRate() {
            try {
                // Fetch latest exchange rate from a free public API
                const res = await fetch('https://api.exchangerate-api.com/v4/latest/NZD');
                const data = await res.json();
                const twdRate = data.rates['TWD'].toFixed(2);
                
                // Update internal translation data
                translations['zh'].notices.find(n => n.id === 'exchangeRate').content = `1 NZD ≈ ${twdRate} TWD`;
                translations['en'].notices.find(n => n.id === 'exchangeRate').content = `1 NZD ≈ ${twdRate} TWD`;
                
                // Re-render UI to display fetched rate if we are in overview
                if (activeDayIndex === -1 && document.getElementById('notice-board')) {
                    updateUI(); 
                }
            } catch (e) {
                console.warn('Failed to fetch exchange rate', e);
                const fallback = "1 NZD ≈ 19.5 TWD";
                translations['zh'].notices.find(n => n.id === 'exchangeRate').content = fallback;
                translations['en'].notices.find(n => n.id === 'exchangeRate').content = fallback;
                if (activeDayIndex === -1 && document.getElementById('notice-board')) updateUI();
            }
        }

        async function fetchWeather(city) {
            const box = document.getElementById('weather-box');
            if (activeDayIndex === -1 || !city) { box.classList.add('hidden'); return; }
            box.classList.remove('hidden');
            document.getElementById('weather-city').innerText = city;
            document.getElementById('weather-temp').innerText = "...";
            try {
                const res = await fetch(`https://wttr.in/${city.replace(" ","+")}?format=%t|%C`);
                const text = await res.text();
                const [temp, desc] = text.split('|');
                document.getElementById('weather-temp').innerText = temp;
                document.getElementById('weather-icon-container').innerHTML = getWeatherIcon(desc);
            } catch (e) { document.getElementById('weather-temp').innerText = "--"; }

        function submitPassword() {
            const pwd = document.getElementById('modal-password-input').value;
            if(!pwd) return;
            
            try {
                const bytes = CryptoJS.AES.decrypt(ENCRYPTED_HOTELS, pwd);
                const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
                
                if (decryptedString) {
                    decryptedHotels = JSON.parse(decryptedString);
                    updateUI();
                    closeModal();
                } else {
                    showModalError();
                }
            } catch (e) {
                showModalError();
            }
        }

        function renderDay(container, ui) {
            const day = itinerary[activeDayIndex];
            const lang = day[currentLang];
            const hotel = decryptedHotels ? decryptedHotels[activeDayIndex] : ui.locked;

            // Check current time and date using simulated time if available
            const now = window.simulatedTime || new Date();
            const todayStr = now.toISOString().split('T')[0];
            const isToday = day.actualDate === todayStr;
            const currentHour = now.getHours();
            const currentMinutes = now.getMinutes();
            const currentTimeVal = currentHour * 60 + currentMinutes;

            // Simple parser to map time string (e.g. "09:00", "早上") to an approximate minute value for the day
            function parseTime(timeStr) {
                if(timeStr.includes(':')) {
                    const parts = timeStr.split(':');
                    return parseInt(parts[0]) * 60 + parseInt(parts[1]);
                }
                const hrMap = { '早上': 540, '上午': 600, 'AM': 540, '中午': 720, 'Noon': 720, '下午': 840, 'PM': 840, '傍晚': 1020, 'Sunset': 1020, '晚上': 1140, 'Night': 1140 };
                return hrMap[timeStr] || 0;
            }

            let activeItemIndex = -1;
            if (isToday) {
                // Find the latest scheduled event that has already started
                for(let i = 0; i < lang.timeline.length; i++) {
                    if (parseTime(lang.timeline[i][0]) <= currentTimeVal) {
                        activeItemIndex = i;
                    }
                }
            }

            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-in fade-in">
                    <div class="lg:col-span-7 space-y-6">
                        <div class="glass-card rounded-[2.5rem] p-8 shadow-2xl relative border-t border-white/60">
                            <div class="mb-8">
                                <span class="${isToday ? 'bg-red-500 animate-pulse' : 'bg-blue-600'} text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase mb-2 inline-block transition-colors">Day ${activeDayIndex + 1}</span>
                                ${day.drive ? `<span class="bg-amber-500 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase mb-2 ml-1 inline-block"><i class="fas fa-car mr-1"></i> ${ui.driveTimeLabel}: ${day.drive}</span>` : ''}
                                <h2 class="text-4xl font-extrabold text-slate-800">${lang.title}</h2>
                                <p class="text-slate-500 font-bold mt-1 text-sm flex items-center gap-1.5"><i class="fas fa-location-dot"></i> ${day.city[currentLang]}</p>
                            </div>
                            <div class="timeline-line space-y-8 pl-1">
                                ${lang.timeline.map((t, index) => {
                                    const isActive = index === activeItemIndex;
                                    return `
                                    <div class="flex gap-6 relative group ${isActive ? 'scale-105 origin-left transition-transform' : ''}">
                                        <div class="w-4 h-4 rounded-full ${isActive ? 'bg-red-500 border-4 border-red-200 animate-pulse' : 'bg-white border-4 border-blue-600'} z-10 mt-1 transition-colors"></div>
                                        <div class="flex-1 pb-4">
                                            <p class="text-[10px] font-bold ${isActive ? 'text-red-500' : 'text-blue-500'} uppercase">${t[0]}</p>
                                            <div class="bg-white/60 flex-1 p-4 rounded-2xl shadow-sm border border-slate-100 group-hover:bg-white transition-colors relative mt-1 ${isActive ? 'border-red-200 ring-1 ring-red-100 shadow-md' : ''}">
                                                ${isActive ? '<span class="absolute -top-2 right-4 bg-red-500 text-white text-[9px] font-bold px-2 py-0.5 rounded uppercase shadow-sm">進行中 Now</span>' : ''}
                                                <p class="text-[15px] font-bold ${isActive ? 'text-red-700' : 'text-slate-700'}">${t[1]}</p>
                                            </div>
                                            ${t[2] ? `
                                            <div class="absolute left-1.5 top-6 bottom-[-20px] w-[2px] bg-slate-200 z-0">
                                                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-100 text-slate-500 text-[9px] font-bold px-2 py-0.5 rounded border border-slate-200 shadow-sm flex items-center gap-1 whitespace-nowrap z-10">
                                                    <i class="fas ${t[2].includes('飛') || t[2].includes('flight') ? 'fa-plane' : t[2].includes('步行') || t[2].includes('walk') ? 'fa-person-walking' : 'fa-car-side'}"></i> ${t[2]}
                                                </div>
                                            </div>
                                            ` : ''}
                                        </div>
                                    </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                        
                        <div class="flex flex-col sm:flex-row gap-4">
                            <div class="flex-1 glass-card p-5 rounded-3xl flex items-center gap-4">
                                <div class="w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center"><i class="fas fa-bed"></i></div>
                                <div>
                                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">${ui.hotelLabel}</p>
                                    <p class="font-bold text-sm ${decryptedHotels ? 'text-indigo-800' : 'text-slate-400 italic'}">${hotel}</p>
                                </div>
                            </div>
                            <a href="https://www.google.com/maps/search/?api=1&query=${day.mapUrl}" target="_blank" class="bg-slate-900 text-white p-5 rounded-3xl flex items-center justify-center gap-2 font-bold text-sm"><i class="fas fa-location-arrow text-blue-400"></i> MAP</a>
                        </div>
                    </div>
                    <div class="lg:col-span-5 h-[400px] lg:h-auto">
                        <div class="glass-card rounded-[2.5rem] p-2 h-full shadow-2xl relative overflow-hidden group">
                            <!-- Skeleton loader -->
                            <div class="absolute inset-2 rounded-[2rem] bg-slate-200 animate-pulse-slow flex flex-col items-center justify-center z-0">
                                <i class="fas fa-map-marked-alt text-4xl text-slate-300 mb-2"></i>
                                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest animate-pulse">Loading Map...</span>
                            </div>
                            <!-- Map iframe -->
                            <iframe frameborder="0" class="relative w-full h-full rounded-[2rem] z-10 opacity-0 transition-opacity duration-1000" onload="this.style.opacity=1" src="https://maps.google.com/maps?q=${day.mapUrl}&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
                        </div>
                    </div>
                </div>
            `;
        }

        function initSnow() {
            const container = document.getElementById('snowfalls');
            if(!container) return;
            const particleCount = 30; // 調整雪花數量
            for (let i = 0; i < particleCount; i++) {
                const flake = document.createElement('div');
                flake.className = 'snowflake';
                // 隨機大小、位置、動畫持續時間與延遲
                const size = Math.random() * 4 + 2; 
                flake.style.width = size + 'px';
                flake.style.height = size + 'px';
                flake.style.left = Math.random() * 100 + 'vw';
                flake.style.animationDuration = Math.random() * 10 + 10 + 's';
                flake.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(flake);
            }
        }

        updateUI();
        initSnow();
        fetchExchangeRate();
    </script>
</body>
</html>
